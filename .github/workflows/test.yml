name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # build.py inlines app.js + app.css + the Python data layer into dist/index.html.
      # It imports only the standard library, so no pip install step is needed.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # playwright.config.ts's webServer runs `python build.py && node serve.js <port>` itself,
      # so the build is exercised by the same command the suite uses locally.
      - name: Run the suite
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # The Worker suite runs the Managed-AI proxy against real workerd via
  # @cloudflare/vitest-pool-workers, which (with wrangler/miniflare) declares engines.node >=22.
  # It is a separate job — no Chromium, no Python — so a Worker regression and an app
  # regression report independently in the CI UI.
  worker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Run the worker suite
        run: npm test
        working-directory: worker
